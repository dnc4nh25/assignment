<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment - FPT</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.light-theme {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        body.light-theme .container {
            background-color: white;
            color: #333;
        }

        body.dark-theme {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #f0f0f0;
        }

        body.dark-theme .container {
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        body.dark-theme input,
        body.dark-theme textarea {
            background-color: #34495e;
            color: #ecf0f1;
            border-color: #4a5f7f;
        }

        body.warm-theme {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #2c1810;
        }

        body.warm-theme .container {
            background-color: #fff5e6;
            color: #2c1810;
        }

        .container {
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #3498db;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .clock-container {
            text-align: center;
            padding: 20px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 10px;
            margin: 20px 0;
        }

        #clock {
            font-size: 3em;
            font-weight: bold;
            color: #3498db;
            font-family: 'Courier New', monospace;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        #date {
            font-size: 1.2em;
            margin-top: 10px;
            color: #7f8c8d;
        }

        .theme-switcher {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .theme-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .theme-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .theme-btn.light {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .theme-btn.dark {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
        }

        .theme-btn.warm {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .contact-form {
            margin-top: 30px;
        }

        .contact-form h2 {
            color: #3498db;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        body.dark-theme .form-group label {
            color: #bdc3c7;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .info {
            margin: 20px 0;
            line-height: 1.8;
        }

        .info p {
            margin-bottom: 10px;
        }

        .success-message {
            display: none;
            background-color: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            #clock {
                font-size: 2em;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="light-theme">
    <div class="container">
        <div class="header">
            <div>
                <h1>🎓 Welcome to FPT University</h1>
                <p>Main Branch Version</p>
            </div>
            <div class="theme-switcher">
                <button class="theme-btn light" onclick="changeTheme('light')">☀️ Sáng</button>
                <button class="theme-btn dark" onclick="changeTheme('dark')">🌙 Tối</button>
                <button class="theme-btn warm" onclick="changeTheme('warm')">🔥 Ấm</button>
            </div>
        </div>

        <div class="clock-container">
            <div id="clock">00:00:00</div>
            <div id="date">Loading...</div>
        </div>

        <div class="info">
            <p>✨ Đây là phiên bản trên branch MAIN.</p>
            <p>🎨 Thử đổi theme bằng các nút phía trên!</p>
            <p>⏰ Đồng hồ cập nhật thời gian thực!</p>
        </div>

        <div class="contact-form">
            <h2>📧 Form Liên Hệ</h2>
            <form id="contactForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="name">Họ và Tên:</label>
                    <input type="text" id="name" name="name" required placeholder="Nhập họ tên của bạn">
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label for="phone">Số Điện Thoại:</label>
                    <input type="tel" id="phone" name="phone" placeholder="0123456789">
                </div>
                
                <div class="form-group">
                    <label for="message">Nội Dung:</label>
                    <textarea id="message" name="message" required placeholder="Nhập nội dung tin nhắn..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Gửi Tin Nhắn</button>
            </form>
            
            <div class="success-message" id="successMessage">
                ✅ Gửi tin nhắn thành công! Cảm ơn bạn đã liên hệ.
            </div>
        </div>
    </div>

    <script>
        function changeTheme(theme) {
            document.body.className = theme + '-theme';
            localStorage.setItem('theme', theme);
        }

        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            changeTheme(savedTheme);
        });

        function updateClock() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            const dayName = days[now.getDay()];
            const date = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            document.getElementById('date').textContent = `${dayName}, ${date}/${month}/${year}`;
        }

        updateClock();
        setInterval(updateClock, 1000);

        function handleSubmit(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            
            console.log('Form Data:', { name, email, phone, message });
            
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            
            document.getElementById('contactForm').reset();
            
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
